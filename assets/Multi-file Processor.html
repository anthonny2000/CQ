<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-file TSV/CSV Processor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 15.6px;
            background-color: #F4F4F9;
            margin: 0;
            padding: 0;
        }
        h1 { text-align: center; margin-top: 20px; color: #333; }
        #source { display: block; margin: 20px auto; padding: 10px; font-size: 16px; }
        button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover { background-color: #0056B3; }
        #resultat { margin-top: 20px; overflow-x: auto; text-align: center; max-height: 750px; overflow-y: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        th, td { padding: 7px 15px; text-align: center; border: 1px solid #ddd; }
        th { background-color: #007BFF; color: white; position: sticky; top: 0; z-index: 1; }
        td { background-color: #F9F9F9; }
        tr:nth-child(even) td { background-color: #F2F2F2; }
        tr:last-child { font-weight: bold; }
        .buttons-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; }
        #commande { height: 30px; border: black 1px; }
    </style>
</head>
<body>

<h1>Multi-file TSV/CSV Processor</h1>
<div class="buttons-container">
    <input type="file" id="source" accept=".csv, .tsv" multiple />
    <span id="dash" style="font-size: 18px; font-weight: bold; color: #007BFF;">0%</span>
    <button id="play">Play</button>
</div>

<!-- Champs pour la recherche -->
<div style="text-align: center; margin-top: 20px;">
    <input type="text" id="titletarget" list="column-suggestions" placeholder="Nom de la colonne à cibler" style="padding: 8px; width: 250px; margin-right: 10px;"><datalist id="column-suggestions">
		<option value="Input.textURL"></option> <!-- Valeur statique -->
</datalist>

    <input type="text" id="findfilebythis" placeholder="Mot-clé à rechercher" style="padding: 8px; width: 250px;">
		
	<button id="search">🔍 Rechercher</button>
</div>


<div id="resultat"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
<script>
document.getElementById('source').addEventListener('change', handleFiles);
document.getElementById('play').addEventListener('click', processFiles);

let allParsedData = [];

function handleFiles(event) {
    const files = event.target.files;
    if (!files.length) return;

    allParsedData = [];

    [...files].forEach(file => {
        Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: results => {
                allParsedData.push(results.data.map(row => ({ ...row, _sourceFile: file.name })));
            },
            error: error => console.error(`Erreur dans ${file.name}:`, error)
        });
    });
}

function processFiles() {
    if (!allParsedData.length) {
        alert('Veuillez charger des fichiers TSV ou CSV valides.');
        return;
    }

    let totalDMT = 0, totalAssignments = 0, totalHitIds = 0, totalEntries = 0, grandTotalAsins = 0;
    let htmlOutput = '<table><thead><tr><th>Source</th><th>TT</th><th>DMT moyenne</th><th>Nb assign</th><th>Nb HITId</th><th>Min ASINs</th><th>Max ASINs</th><th>Total ASINs</th></tr></thead><tbody>';

    allParsedData.forEach(data => {
        let result = {};

        data.forEach(row => {
            const sourceName = row["Source.name"] || row["_sourceFile"];
            const dmt = calculateDMT(row["AcceptTime"], row["SubmitTime"]);
            let asinCount = 0;

            try { asinCount = Object.keys(JSON.parse(row["Answer.output_data"] || "{}")).length; } catch {}

            if (!result[sourceName]) result[sourceName] = { totalDMT: 0, count: 0, assignments: new Set(), hitIds: [], minAsinCount: Infinity, maxAsinCount: 0, totalAsinCount: 0 };

            result[sourceName].totalDMT += dmt;
            result[sourceName].count++;
            result[sourceName].assignments.add(row["AssignmentId"]);
            result[sourceName].hitIds.push(row["HITId"]);
            result[sourceName].minAsinCount = Math.min(result[sourceName].minAsinCount, asinCount);
            result[sourceName].maxAsinCount = Math.max(result[sourceName].maxAsinCount, asinCount);
            result[sourceName].totalAsinCount += asinCount;
        });

        for (const [sourceName, data] of Object.entries(result)) {
            const avgDMT = formatDuration(data.totalDMT / data.count);
            const nbAssignments = data.assignments.size;
            const nbHitIds = new Set(data.hitIds).size;

            htmlOutput += `<tr>
                <td>${sourceName}</td><td>${formatDuration(data.totalDMT)}</td><td>${avgDMT}</td>
                <td>${nbAssignments}</td><td>${nbHitIds}</td><td>${data.minAsinCount}</td>
                <td>${data.maxAsinCount}</td><td>${data.totalAsinCount}</td>
            </tr>`;

            totalDMT += data.totalDMT;
            totalAssignments += nbAssignments;
            totalHitIds += nbHitIds;
            totalEntries += data.count;
            grandTotalAsins += data.totalAsinCount;
        }
    });

    htmlOutput += `<tr><td><strong>Total</strong></td>
        <td><strong>${formatDuration(totalDMT)}</strong></td>
        <td><strong>${formatDuration(totalDMT / totalEntries)}</strong></td>
        <td><strong>${totalAssignments}</strong></td>
        <td><strong>${totalHitIds}</strong></td>
        <td>-</td><td>-</td><td><strong>${grandTotalAsins}</strong></td>
    </tr></tbody></table>`;

    document.getElementById('resultat').innerHTML = htmlOutput;
}


//debut fonction pour rechercher mots clé dans la colonne cible
document.getElementById('search').addEventListener('click', function () {
    const columnTarget = document.getElementById('titletarget').value.trim(); // Colonne à rechercher
    const keyword = document.getElementById('findfilebythis').value.trim().toLowerCase(); // Mot-clé recherché

    if (!columnTarget || !keyword) {
        alert("⚠️ Veuillez entrer un nom de colonne et un mot-clé !");
        return;
    }

    let foundFiles = new Set(); // Stocke les fichiers où le mot-clé est trouvé
    let columnMissingFiles = 0; // Nombre de fichiers où la colonne est absente

    allParsedData.forEach(fileData => {
        if (!fileData.length) return; // Fichier vide

        const firstRow = fileData[0]; // Prend la première ligne pour voir les colonnes disponibles
        if (!(columnTarget in firstRow)) {
            columnMissingFiles++; // Compter les fichiers sans cette colonne
            return; // Passer au fichier suivant
        }

        // Vérifier si le mot-clé est présent dans la colonne ciblée
        const containsKeyword = fileData.some(row => 
            row[columnTarget] && row[columnTarget].toLowerCase().includes(keyword)
        );

        if (containsKeyword) {
            foundFiles.add(fileData[0]._sourceFile); // Enregistre le fichier
        }
    });

    const rows = document.querySelectorAll("#resultat table tbody tr");

    // Réinitialiser la mise en surbrillance
    rows.forEach(row => {
        row.cells[0].style.backgroundColor = ""; 
        row.cells[0].style.fontWeight = "normal"; 
    });

    if (foundFiles.size > 0) {
        rows.forEach(row => {
            const fileName = row.cells[0]?.textContent.trim();
            if (foundFiles.has(fileName)) {
                row.cells[0].style.backgroundColor = "#FFD700"; // 🟡 Surbrillance
                row.cells[0].style.fontWeight = "bold"; // Mise en gras
            }
        });
    } else {
        alert(`❌ Aucun fichier ne contient "${keyword}" dans la colonne "${columnTarget}" !`);
    }

    // Vérifier si aucun fichier n'a la colonne demandée
    if (columnMissingFiles === allParsedData.length) {
        alert(`⚠️ La colonne "${columnTarget}" est absente de tous les fichiers chargés !`);
    }
});


//fin fonction pour rechercher mots clé dans la colonne cible 

function calculateDMT(acceptTime, submitTime) {
    if (!acceptTime || !submitTime) {
        console.warn(`Données manquantes: AcceptTime=${acceptTime}, SubmitTime=${submitTime}`);
        return 0;
    }

    // 🛠️ Conversion correcte de la date avec `Date.parse()` pour éviter `Invalid Date`
    const acceptDate = new Date(Date.parse(acceptTime));
    const submitDate = new Date(Date.parse(submitTime));

    if (isNaN(acceptDate.getTime()) || isNaN(submitDate.getTime())) {
        console.error(`Erreur parsing dates: AcceptTime=${acceptTime}, SubmitTime=${submitTime}`);
        return 0;
    }

    let diffInSeconds = (submitDate - acceptDate) / 1000;
    if (diffInSeconds < 0) diffInSeconds += 86400; // Correction si soumission après minuit

    return diffInSeconds;
}


function formatDuration(seconds) {
    seconds = Math.round(seconds); // On arrondit les secondes pour éviter les décimales
    const h = String(Math.floor(seconds / 3600)).padStart(2, '0');
    const m = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    return `${h}:${m}:${s}`;
};

document.getElementById('resultat').addEventListener('click', async function () {
    const table = document.querySelector('#resultat table');
    if (!table) return;

    try {
        const rows = Array.from(table.rows).slice(1, -1); // Exclut la première et dernière ligne
        const tsvData = rows.map(row => 
            Array.from(row.cells).map(cell => cell.textContent.trim()).join('\t')
        ).join('\n');

        await navigator.clipboard.writeText(tsvData);
        alert("📋 Données copiées (sans en-tête et sans la ligne Total) !");
    } catch (error) {
        console.error("❌ Erreur lors de la copie :", error);
        alert("⚠️ Erreur lors de la copie !");
    }
});

//fonction qui mets a jour dash - progressions
let totalFiles = 0;  // Nombre total de fichiers téléchargés
let processedFiles = 0;  // Nombre de fichiers traités

// Met à jour le pourcentage affiché dans le #dash
function updateProgress() {
    const percentage = totalFiles ? (100 * processedFiles / totalFiles).toFixed(0) : 0;
    document.getElementById('dash').textContent = `${percentage}%`;
}

// Modification dans handleFiles() pour calculer le nombre total de fichiers et initier le traitement
function handleFiles(event) {
    const files = event.target.files;
    if (!files.length) return;

    totalFiles = files.length;  // Nombre total de fichiers téléchargés
    processedFiles = 0;  // Réinitialiser le compteur de fichiers traités

    allParsedData = [];

    [...files].forEach(file => {
        Papa.parse(file, {
            header: true,
            skipEmptyLines: true,
            complete: results => {
                allParsedData.push(results.data.map(row => ({ ...row, _sourceFile: file.name })));
                processedFiles++;  // Incrémenter le nombre de fichiers traités
                updateProgress();  // Mettre à jour le pourcentage
            },
            error: error => {
                console.error(`Erreur dans ${file.name}:`, error);
                processedFiles++;  // Même si le fichier a échoué, on considère qu'il a été "traité"
                updateProgress();  // Mettre à jour le pourcentage
            }
        });
    });
}

</script>

</body>
</html>
