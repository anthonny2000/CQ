<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
	
	
	
	/* ============================================================
   MODE ANALYSE - AMBRE & LASER SCAN
   ============================================================ */

:root {
    --analysis-gold: #ffb347;
    --analysis-glow: rgba(255, 179, 71, 0.4);
}

/* 1. Style de base de la carte Analyse */
.card.mode-analysis {
    border: 1px solid rgba(255, 179, 71, 0.2);
    background: linear-gradient(145deg, rgba(45, 34, 15, 0.9), rgba(15, 12, 5, 0.8));
    position: relative;
    overflow: hidden; /* Crucial pour le laser */
}

/* 2. L'effet de Halo (Aura) au survol */
.card.mode-analysis:hover {
    border-color: var(--analysis-gold);
    box-shadow: 0 0 30px var(--analysis-glow), 
                inset 0 0 15px rgba(255, 179, 71, 0.1);
    transform: scale(1.05) translateY(-5px);
}

/* 3. LE SCANNER LASER (L'effet "Éblouissant") */
.card.mode-analysis::after {
    content: "";
    position: absolute;
    top: -100%;
    left: 0;
    width: 100%;
    height: 100%;
    /* Gradient qui crée une ligne fine et brillante */
    background: linear-gradient(
        to bottom,
        transparent 45%,
        var(--analysis-gold) 50%,
        rgba(255, 179, 71, 0.2) 51%,
        transparent 60%
    );
    opacity: 0.4;
    pointer-events: none;
    animation: laser-scan 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
}

/* 4. Le Badge Spécifique */
.analysis-badge {
    background: rgba(255, 179, 71, 0.1);
    color: var(--analysis-gold);
    border: 1px solid var(--analysis-gold);
    box-shadow: 0 0 5px rgba(255, 179, 71, 0.2);
}

/* 5. Animation du laser
@keyframes laser-scan {
    0% {
        top: -100%;
    }
    70% {
        top: 100%;
    }
    100% {
        top: 100%;
    }
}*/

/* 6. Optionnel : Petit scintillement de l'icône */
.card.mode-analysis .icon {
    filter: drop-shadow(0 0 10px var(--analysis-gold));
    animation: icon-flicker 3s infinite;
}

@keyframes icon-flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
}
        :root {
            --primary: #00d2ff;
            --secondary: #92fe9d;
            --accent-purple: #8e2de2;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Rajdhani', sans-serif;
            background:radial-gradient(circle at top right, #2196F3, #180ec1);
			color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Animation de fond */
        body::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--primary), transparent 30%);
            animation: rotate 10s linear infinite;
            opacity: 0.1;
            z-index: -1;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 50px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.3));
        }

        .container {
            display: flex;
            gap: 40px;
        }

        .card {
            position: relative;
            background: var(--card-bg);
            width: 320px;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }

        .card:hover::before {
            transform: translateX(100%);
        }

        .card:hover {
            transform: scale(1.05);
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
        }

        /* Styles spécifiques pour chaque mode */
        .card.mode-normal:hover { border-color: var(--primary); box-shadow: 0 0 30px rgba(0, 210, 255, 0.3); }
        .card.mode-inverse:hover { border-color: var(--accent-purple); box-shadow: 0 0 30px rgba(142, 45, 226, 0.3); }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: block;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin: 10px 0;
            color: #fff;
        }

        p {
            color: #94a3b8;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .badge {
            margin-top: 20px;
            display: inline-block;
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .normal-badge { background: rgba(0, 210, 255, 0.1); color: var(--primary); border: 1px solid var(--primary); }
        .inverse-badge { background: rgba(142, 45, 226, 0.1); color: #c084fc; border: 1px solid var(--accent-purple); }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.9rem;
            color: #3bffa3;
            letter-spacing: 2px;
        }
		/* Conteneur fixé en haut à droite */
.fab-wrapper {
    position: fixed;
    top: 30px;
    right: 30px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Bouton Principal (Style identique à tes boutons circulaires) */
.fab-main {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: var(--card-bg);
    border: 1px solid var(--primary);
    color: var(--primary);
    font-family: 'Orbitron', sans-serif;
    font-size: 24px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Menu de déploiement */
.fab-menu {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 15px;
    opacity: 0;
    visibility: hidden;
    transform: translateY(-20px);
    transition: all 0.3s ease;
}

/* Affichage au survol du conteneur */
.fab-wrapper:hover .fab-menu {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.fab-wrapper:hover .fab-main {
    transform: rotate(45deg);
    border-color: var(--secondary);
    color: var(--secondary);
    box-shadow: 0 0 20px rgba(146, 254, 157, 0.4);
}

/* Boutons d'actions secondaires */
.fab-action {
    width: 110px; /* Un peu plus large pour le texte */
    padding: 8px 15px;
    border-radius: 8px;
    background: var(--card-bg);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    text-transform: uppercase;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.2s ease;
    text-align: center;
}

.fab-action:hover {
    border-color: var(--primary);
    background: rgba(0, 210, 255, 0.1);
    transform: translateX(-5px); /* Petit décalage vers la gauche au survol */
    box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
}

    </style>

</head>
<body>

        <button class="fab-action" onclick="window.location.href='index/DATA Extractor.html'">Data Extractor</button>
        <button class="fab-action" onclick="window.location.href='index/Counter BDD - Copie(2).html'">Action 3</button>
    </div>
</div>

</body>
