<script>
//regle de correction et detection d'erreur PROMPT
/*la correspondance fonction , c'est le format et correction qui ne fonctione pas
sauf erreur format
tu verifie d'abord s'il y a d'autre symbole que [ ] , " ou espace
si il y a espace tu suprime ensuite
si il y a point . ou point-virgule ; tu les remplace par virgule , et ensuite tu lance le verif du format
je vais de redifinir la regle  sur le guillemet alors, si elle est double tu la remplace d'abord par une seule et ensuite tu lance ses sequence de verif (idem pour les autre)
elle dois tjr etr accompagne de ses symbole
["
"]
","
","

autre que cela est une erreur
ex: 
X"X => remplacer par X","X
X",X => remplacer par X","X
X,"X => remplacer par X","X
X""X => remplacer par X","X
X""] => remplacer par X"] autre que cela remplacer par une seule
[""X => remplacer par ["X


de même pour les crochet [ et ]
["
"]
autre que cela est une erreur 
[X => remplacer par ["X
X] => remplacer par X"]
]] => remplacer par ]
[[ => remplacer par [

de même pour virgule ,
tjr  ","
autre que cela est une erreur 
X,X  => remplacer par X","X
X,"X  => remplacer par X","X
X",X  => remplacer par X","X
,]  => remplacer par "]
[,  => remplacer par ["

*/


let rows = [];
let dirtyData = []; 
let correspErrors = []; 

// --- CONFIGURATION ---
const OUTPUT_KEYS = [
    "COULD_NOT_CONCLUDE",
    '["ALL_SOURCE_ARTIFACTS_ARE_NOT_LOADING"]',
    '["ALL_TARGET_ARTIFACTS_ARE_NOT_LOADING"]',
    '["ALL_SOURCE_ARTIFACTS_ARE_NOT_LOADING","ALL_TARGET_ARTIFACTS_ARE_NOT_LOADING"]',
    '["SOURCE_BRAND_HAS_NO_BRAND_INFO"]',
    '["TARGET_BRAND_HAS_NO_BRAND_INFO"]',
    '["SOURCE_BRAND_HAS_NO_BRAND_INFO","TARGET_BRAND_HAS_NO_BRAND_INFO"]',
    '["SOURCE_IS_MIXED_UP_AND_TRUTH_SET_NOT_APPLICABLE"]',
    '["TARGET_IS_MIXED_UP_AND_TRUTH_SET_NOT_APPLICABLE"]',
    '["SOURCE_IS_MIXED_UP_AND_TRUTH_SET_NOT_APPLICABLE","TARGET_IS_MIXED_UP_AND_TRUTH_SET_NOT_APPLICABLE"]',
    '["SOURCE_BRAND_TRADEMARK_IS_INCONCLUSIVE"]',
    '["TARGET_BRAND_TRADEMARK_IS_INCONCLUSIVE"]',

    "UNIQUE",
    '["COMPLETELY_DIFFERENT"]',
    '["COMPLETELY_DIFFERENT_AND_SOURCE_HAS_MIXED_UP_ARTIFACTS","COMPLETELY_DIFFERENT_AND_TARGET_HAS_MIXED_UP_ARTIFACTS"]',
    '["COMPLETELY_DIFFERENT_AND_SOURCE_HAS_MIXED_UP_ARTIFACTS"]',
    '["COMPLETELY_DIFFERENT_AND_TARGET_HAS_MIXED_UP_ARTIFACTS"]',
    '["COMPLETELY_DIFFERENT_BASED_ON_TRUTH_SET_WITH_MIXED_UP_SOURCE","COMPLETELY_DIFFERENT_BASED_ON_TRUTH_SET_WITH_MIXED_UP_TARGET"]',
    '["COMPLETELY_DIFFERENT_BASED_ON_TRUTH_SET_WITH_MIXED_UP_SOURCE"]',
    '["COMPLETELY_DIFFERENT_BASED_ON_TRUTH_SET_WITH_MIXED_UP_TARGET"]',
    '["HOMONYMS"]',
    '["HOMONYMS_BASED_ON_TRUTH_SET_WITH_MIXED_UP_SOURCE","HOMONYMS_BASED_ON_TRUTH_SET_WITH_MIXED_UP_TARGET"]',
    '["HOMONYMS_BASED_ON_TRUTH_SET_WITH_MIXED_UP_SOURCE"]',
    '["HOMONYMS_BASED_ON_TRUTH_SET_WITH_MIXED_UP_TARGET"]',
    '["RELATED_BRANDS"]',
    '["RELATED_BASED_ON_TRUTH_SET_WITH_MIXED_UP_SOURCE"]',
    '["RELATED_BASED_ON_TRUTH_SET_WITH_MIXED_UP_TARGET"]',
    '["RELATED_BASED_ON_TRUTH_SET_WITH_MIXED_UP_SOURCE","RELATED_BASED_ON_TRUTH_SET_WITH_MIXED_UP_TARGET"]'
];

document.getElementById("fileInput").addEventListener("change", async e => {
    rows = [];
    const files = e.target.files;
    const totalFiles = files.length;

    // --- PHASE 1 : CHARGEMENT (0% -> 70%) ---
    for (let i = 0; i < totalFiles; i++) {
        const file = files[i];
        const loadPercent = Math.round(((i + 1) / totalFiles) * 70);

            const wb = XLSX.read(data, { type: "array" });
            const ws = wb.Sheets[wb.SheetNames[0]];
            dataToPush = XLSX.utils.sheet_to_json(ws, { defval: "" });
        } else {
            const text = await file.text();
            const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
            dataToPush = parsed.data;
        }

// --- UTILITAIRE DE NORMALISATION (ORDRE LOGO/URL) ---
function normalize(reason) {
    if (!reason) return "";
    try {
        let clean = reason.trim();
        if (clean.startsWith("'") && clean.endsWith("'")) clean = clean.slice(1, -1);
        
        // On tente de parser le JSON (ex: ["LOGO","URL"])
        let arr = JSON.parse(clean);
        if (Array.isArray(arr)) {
            // On trie alphabétiquement pour que ["URL","LOGO"] soit égal à ["LOGO","URL"]
            return JSON.stringify(arr.map(s => String(s).trim()).sort());
        }
    } catch (e) {
        return reason.trim(); 
    }
    return reason.trim();
}

// --- LOGIQUE DE DÉTECTION ---
function calculateErrors() {
    dirtyData = [];
    correspErrors = [];

    rows.forEach(r => {
        const val = (r.Answer_Reason || "").trim();
        const type = (r.Answer_IsDupe || "").trim();
        
        if (val === "" && type === "") return;

        let isDirty = false;
        if (val !== "") {
            // RÈGLE 1: Caractères interdits ou parasites
            if (/[.;\s]/.test(val)) isDirty = true;
            
            // RÈGLE 2: Doublons de symboles (,, ou "" ou [[ ou ]])
            if (val.includes(',,') || val.includes('""') || val.includes('[[') || val.includes(']]')) isDirty = true;

            // RÈGLE 3: Structure des extrémités
            if (!val.startsWith('["') || !val.endsWith('"]')) isDirty = true;

            // RÈGLE 4: Symboles orphelins à l'intérieur
            let core = val.substring(2, val.length - 2);
            // Si on enlève le motif valide "," il ne doit rester ni " ni ,
            let checkInternal = core.split('","').join('');
            if (checkInternal.includes('"') || checkInternal.includes(',')) isDirty = true;
        }
        
        if (isDirty) dirtyData.push({ file: r.fileName, taskId: r.TaskID || "N/A", val: val });

        // --- Correspondance (Mismatch) ---
        const normVal = normalize(val);
        const check = (list) => list.map(item => normalize(item)).includes(normVal);
        let isValidMapping = false;
        if (type === "UNIQUE") isValidMapping = check(VALID_UNQ_LIST);
        else if (type === "DUPLICATE") isValidMapping = check(VALID_DUPL_LIST);
        else if (type === "COULD_NOT_CONCLUDE") isValidMapping = check(VALID_CNC_LIST);

        if (!isValidMapping && type !== "" && val !== "") {
            let corr = "UNKNOWN";
            if (check(VALID_UNQ_LIST)) corr = "UNIQUE";
            else if (check(VALID_DUPL_LIST)) corr = "DUPLICATE";
            else if (check(VALID_CNC_LIST)) corr = "COULD_NOT_CONCLUDE";
            correspErrors.push({ taskId: r.TaskID || "N/A", wrong: type, correct: corr, reason: val });
        }
    });
    updateBadges();
}

function appliquerCorrection() {
    rows.forEach(r => {
        if (r.Answer_Reason) {
            let v = r.Answer_Reason.trim();

            // --- ÉTAPE 1 : Nettoyage des caractères parasites ---
            v = v.replace(/\s+/g, ''); // Supprime tous les espaces
            v = v.replace(/[.;]+/g, ','); // . et ; deviennent des virgules

            // --- ÉTAPE 2 : Gestion des cas de guillemets doubles et extrémités ---
            // [" " X => ["X
            v = v.replace(/^\["+/g, '["');
            // X " " ] => X"]
            v = v.replace(/"+\]$/g, '"]');
            // [[ ou ]] => [ ou ]
            v = v.replace(/\[+/g, '[').replace(/\]+/g, ']');

            // --- ÉTAPE 3 : Extraction du contenu ---
            // On enlève les crochets et guillemets de bordure pour travailler sur le texte pur
            let content = v.replace(/^\["/, '').replace(/"\]$/, '');
            // On enlève aussi les crochets simples s'ils traînent encore
            content = content.replace(/[\[\]]/g, '');

            // --- ÉTAPE 4 : Séparation et Reconstruction (La règle du X"X, X"",X etc.) ---
            // On considère que n'importe quelle suite de " ou , (ex: "", ou ", ou ,") 
            // est en fait une simple séparation entre deux mots.
            let elements = content.split(/["",]+/).filter(el => el !== "");

            // --- ÉTAPE 5 : Formatage Strict ---
            // JSON.stringify recrée parfaitement le format ["MOT1","MOT2"]
            // avec une seule virgule et des guillemets doubles là où il faut.
            r.Answer_Reason = JSON.stringify(elements);
        }
    });
    
    calculateErrors(); // Relance la détection pour vider dirtyData
    renderErreursFind(); // Rafraîchit le tableau
    alert("✅ Correction effectuée selon les nouvelles règles de guillemets.");
}

// --- ACTIONS DE CORRECTION ---
function appliquerCorrection() {
    rows.forEach(r => {
        if (r.Answer_Reason) {
            let v = r.Answer_Reason.trim();

            // 1. SEQUENCE DE PRE-NETTOYAGE
            v = v.replace(/\s+/g, '');          // Supprime les espaces
            v = v.replace(/[.;]+/g, ',');       // . et ; deviennent ,
            v = v.replace(/"{2,}/g, '"');       // "" devient "
            v = v.replace(/\[{2,}/g, '[');      // [[ devient [
            v = v.replace(/\]{2,}/g, ']');      // ]] devient ]

            // 2. RÉPARATION DES EXTRÉMITÉS (Crochets et virgules traînantes)
            // Cas : [, => ["  et  ,] => "]
            v = v.replace(/^\[,/g, '["').replace(/,\]$/g, '"]');
            
            // Si c'est juste du texte sans crochets : X => ["X"]
            if (!v.startsWith('["')) {
                if (v.startsWith('[')) v = v.replace('[', '["');
                else v = '["' + v;
            }
            if (!v.endsWith('"]')) {
                if (v.endsWith(']')) v = v.replace(']', '"]');
                else v = v + '"]';
            }

            // 3. RÉPARATION INTERNE (Règle X"X, X",X, X,X -> X","X)
            // On extrait ce qui est entre les symboles [" et "]
            let core = v.substring(2, v.length - 2);

            // On traite tous les séparateurs cassés (mélange de " et ,)
            // L'idée est de réduire n'importe quelle suite de " et , en une seule virgule
            core = core.replace(/["",]+/g, ',');

            // On découpe par cette virgule pour avoir les mots propres
            let elements = core.split(',').filter(el => el !== "");

            // 4. RECONSTRUCTION JSON STRICTE
            // JSON.stringify transformera ['LOGO', 'URL'] en ["LOGO","URL"]
            // Cela garantit que chaque mot est entouré de " et séparé par ","
            r.Answer_Reason = JSON.stringify(elements);
        }
    });

    calculateErrors();
    renderErreursFind();
    alert("✅ Correction effectuée selon les règles de reconstruction.");
}


function telechargerCorriger() {
    if (rows.length === 0) {
        alert("Aucune donnée à exporter.");
        return;
    }

    // On utilise Papa.unparse avec le délimiteur tabulation '\t'
    const tsv = Papa.unparse(rows, {
        delimiter: "\t",
        header: true
    });

    // Création du Blob avec le type MIME pour TSV
    const blob = new Blob([tsv], { type: 'text/tab-separated-values;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    
    const link = document.createElement("a");
    link.href = url;
    
    // Nom du fichier avec extension .tsv
    const timestamp = new Date().toISOString().slice(0,10);
    link.download = `export_corrige_${timestamp}.tsv`;
    
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

    if (bCorresp) { bCorresp.textContent = correspErrors.length; bCorresp.style.display = correspErrors.length > 0 ? "block" : "none"; }
}

function renderGlobal() {
    updateActive('btn-global');
    const total = rows.length;
    const counts = {};
    
    // Initialisation
    OUTPUT_KEYS.forEach(k => counts[k] = 0);

    rows.forEach(r => {
        const type = r.Answer_IsDupe;
        const reason = r.Answer_Reason;

        // On compte le type (COULD_NOT_CONCLUDE, etc.)
        if (counts[type] !== undefined) counts[type]++;
        // On compte la raison exacte (la chaîne ["..."])
        if (counts[reason] !== undefined) counts[reason]++;
    });

    const tableData = OUTPUT_KEYS.map(k => [
        k, 
        counts[k], 
        total ? `${((counts[k] / total) * 100).toFixed(1)}%` : "0%"
    ]);
    
    tableData.push(["Grand Total", total, "100%"]);
    draw(["Outcomes", "Count", "%"], tableData, "table-stats");
}


function renderErreursFind() {
    updateActive('btn-erreurs');
    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3>⚠️ Erreurs de format (${dirtyData.length})</h3>
            <div>
                <button class="correction" onclick="appliquerCorrection()" style="margin-right:10px;">✨ Nettoyer Format</button>
                <button class="correction" onclick="telechargerCorriger()" style="background:#2e2e60;">📥 Télécharger TSV</button>
            </div>
        </div>
    `;
    if (dirtyData.length === 0) { resultDiv.innerHTML += "<p>Aucune erreur détectée.</p>"; return; }
    draw(["TaskID", "answerReason", "Source"], dirtyData.map(d => [d.taskId, d.val, d.file]), "table-errors");
}

function renderCorrespondence() {
    updateActive('btn-correspondence');
    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = `<h3 style="margin-bottom:15px;">🔄 Erreurs de Correspondance (${correspErrors.length})</h3>`;
    if (correspErrors.length === 0) { resultDiv.innerHTML += "<p>Toutes les correspondances sont correctes.</p>"; return; }
    draw(["TaskID", "wrong_answerDupe", "correct_answerDupe", "answerReason"], correspErrors.map(err => [err.taskId, err.wrong, err.correct, err.reason]), "table-errors");
}

function renderByWorker(){
    updateActive('btn-worker');
    const map = {};
    rows.forEach(r => {
        const date = r.SubmissionTime ? r.SubmissionTime.split(' ')[0] : "N/A";
        const key = date + "|" + (r.AwsWorkerID || "Inconnu");
        if (!map[key]) {
            map[key] = { Date: date, Worker: r.AwsWorkerID || "Inconnu" };
            OUTPUT_KEYS.forEach(k => map[key][k] = 0);
        }
        if (map[key][r.Answer_IsDupe] !== undefined) map[key][r.Answer_IsDupe]++;
        const res = REASON_MAPPING[r.Answer_Reason] ?? null;
        if (res && map[key][res] !== undefined) map[key][res]++;
    });
    const headers = ["Date", "Worker", ...OUTPUT_KEYS];
    const data = Object.values(map).map(o => headers.map(h => o[h] ?? 0));
    draw(headers, data, "table-stats");
}

function renderByBatch() {
    updateActive('btn-batch');
    const fileNames = [...new Set(rows.map(r => r.fileName))].sort();
    const map = {};

    // Initialisation du dictionnaire à double entrée
    OUTPUT_KEYS.forEach(k => { 
        map[k] = {}; 
        fileNames.forEach(f => map[k][f] = 0); 
    });

    rows.forEach(r => {
        const f = r.fileName;
        const type = r.Answer_IsDupe;
        const reason = r.Answer_Reason;

        if (map[type]) map[type][f]++;
        if (map[reason]) map[reason][f]++;
    });

    const tableData = OUTPUT_KEYS.map(k => [
        k, 
        ...fileNames.map(f => map[k][f])
    ]);

    // Ligne Grand Total
    const totals = ["Grand Total", ...fileNames.map(f => {
        return rows.filter(r => r.fileName === f).length;
    })];
    tableData.push(totals);

    draw(["Outcomes", ...fileNames], tableData, "table-stats");
}

function renderTruthSet() {
    updateActive('btn-truth');
    const cols = ['targetTruthSetWebsite','targetTruthSetTrademark','targetTruthSetProduct1','targetTruthSetProduct2','sourceTruthSetWebsite','sourceTruthSetTrademark','sourceTruthSetProduct1','sourceTruthSetProduct2'];
    const uniques = ['sourceUBI', 'targetUBI', 'TaskID'];
    const fileNames = [...new Set(rows.map(r => r.fileName))].sort();
    const countsMap = {}; const uniqueMap = {};
    cols.forEach(c => { countsMap[c] = {}; fileNames.forEach(f => countsMap[c][f] = 0); });
    uniques.forEach(u => { uniqueMap[u] = {}; fileNames.forEach(f => uniqueMap[u][f] = new Set()); });
    rows.forEach(r => {
        const f = r.fileName;
        cols.forEach(c => { if(r[c] && String(r[c]).trim() !== "") countsMap[c][f]++; });
        uniques.forEach(u => { if(r[u] && String(r[u]).trim() !== "") uniqueMap[u][f].add(r[u]); });
    });
    const data = [...cols.map(c => [c, ...fileNames.map(f => countsMap[c][f])]), ...uniques.map(u => ["Unique " + u, ...fileNames.map(f => uniqueMap[u][f].size)])];
    draw(["Metrics", ...fileNames], data, "table-stats");
}


function draw(headers, data, customClass = ""){
    const div = document.getElementById("result");
    if(customClass === "table-stats") div.innerHTML = "";
    const t = document.createElement("table");
    t.className = customClass;
    const thead = document.createElement("thead");
    const trh = document.createElement("tr");
    headers.forEach(h => { const th = document.createElement("th"); th.textContent = h; trh.appendChild(th); });
    thead.appendChild(trh); t.appendChild(thead);
    const tbody = document.createElement("tbody");
    data.forEach(row => {
        const tr = document.createElement("tr");
        row.forEach((c, index) => { 
            const td = document.createElement("td"); 
            td.textContent = c; 
            // Couleurs pour les erreurs de correspondance
            if (customClass === "table-errors" && headers[index] === "wrong_answerDupe") td.style.color = "#ff4444";
            if (customClass === "table-errors" && headers[index] === "correct_answerDupe") td.style.color = "#00ff88";
            
            // Sélection au clic
            td.onclick = function(e) {
                const selection = window.getSelection();
                const range = document.createRange();
                range.selectNodeContents(this);
                selection.removeAllRanges();
                selection.addRange(range);
                e.stopPropagation();
            };
            tr.appendChild(td); 
        });
        tbody.appendChild(tr);
    });
    t.appendChild(tbody); div.appendChild(t);
}

function updateActive(id) {
    document.querySelectorAll('.nav_link').forEach(a => a.classList.remove('active'));
    if(id) {
        const el = document.getElementById(id);
        if(el) el.classList.add('active');
    }
}

function copier(){
    const t = document.querySelector("#result table");
    if (!t) return;
    const text = [...t.querySelectorAll("tr")].map(r => [...r.children].map(c => c.innerText).join("\t")).join("\n");
    navigator.clipboard.writeText(text);
    alert("✅ Données copiées !");
}
