		<!DOCTYPE html>
		<html lang="fr">
		<head>
		  <meta charset="UTF-8" />
		  <title>Source vs Target Viewer</title>

		  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
		  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
		  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
		  <script src="DUPL.js"></script>
		  <script src="UNQ.js"></script>
		  <script src="CNC.js"></script>

		  <link rel="stylesheet" href="styles3source.css">
		  <style>
			#sourceUBIsearch {
				background: rgba(0, 0, 0, 0.4);
				border: 1px solid rgba(255, 255, 255, 0.1);
				color: #92fe9d;
				padding: 5px;
				border-radius: 4px;
				width: 150px;
				height: 25px;

			#ubiHelper {
				background: rgba(255, 255, 255, 0.1);

				color: white;

				border-radius: 4px;
				width: 150px;

			/* Style du nouveau compteur de progression locale */
			#taskProgress {
				background: rgba(146, 254, 157, 0.1);
				border: 1px solid #92fe9d;
				color: #92fe9d;
				padding: 2px 8px;
				border-radius: 20px;
				font-weight: bold;
				font-size: 12px;
				margin-left: 10px;
			}
			#historyModal {
				display: none;
				position: fixed;
				top: 70px;
				right: 20px;
				background: rgba(15, 23, 42, 0.95);
				border: 1px solid #00d2ff;
				padding: 15px;
				border-radius: 8px;
				z-index: 10000;
				max-height: 400px;
				overflow-y: auto;
				box-shadow: 0 0 20px rgba(0,0,0,0.8);
				color: white;
			}
			#historyTable { width: 100%; border-collapse: collapse; font-size: 12px; }
			#historyTable th { border-bottom: 1px solid #00d2ff; padding: 5px; color: #00d2ff; }
			#historyTable td { padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); }

			/* ===== QA SELECT ===== */
			.qa-input-dupe, .qa-input-reason {
				width: 100%;
				background: rgba(0, 0, 0, 0.6);
				color: #92fe9d;
				border: 1px solid rgba(0, 210, 255, 0.4);
				border-radius: 4px;
				padding: 4px 6px;
				font-family: monospace;
				font-size: 11px;
				cursor: pointer;
				margin-top: 4px;
				transition: border-color 0.2s, box-shadow 0.2s;
			}
			.qa-input-dupe:focus, .qa-input-reason:focus {
				outline: none;
				border-color: #00d2ff;
				box-shadow: 0 0 8px rgba(0, 210, 255, 0.4);
			}
			.qa-input-dupe option, .qa-input-reason option {
				background: #0f172a;
				color: #f8fafc;
			}
		  </style>
		</head>

		<body>

		<div class="controls">
		  <input type="file" id="fileInput" accept=".tsv,.csv,.xlsx,.xls,.txt" />

		  <div style="display: inline-block; vertical-align: middle;">
			<input type="text" id="ubiHelper" list="ubiSuggestions" placeholder="🔍 Suggestion...">
			<datalist id="ubiSuggestions"></datalist>
			<textarea id="sourceUBIsearch" placeholder="Queue list..."></textarea>
		  </div>

		  <button id="playBtn">▶</button>
		  <button id="prevBtn">⬅ Précédent</button>
		  <button id="nextBtn">➡ Suivant</button>
			<div class="list-wrapper">
				<button id="liste">📋 Liste</button>
				
				<div id="listPanel" class="panel collapsed bottom-deploy">
					<h3 class="list-title">Synthèse Targets</h3>
					<div id="listContent"></div>
				</div>
			</div>

		<div class="stats-group" style="display: inline-flex; align-items: center;">
		  <span id="counter" title="Position dans le fichier">0 / 0</span>
		  <span id="taskProgress" title="Progression sur l'UBI actuel">0 / 0</span>
		  <span id="targetCounter" title="Total validé dans la session" style="color: #92fe9d; font-weight: bold; margin-left: 10px;">Total: 0</span>
		</div>
		 <button id="historyBtn">📋 Logs</button>
		
		
		
		
		
		
</div>

		<div id="viewer"></div>

		<div id="historyModal">
			<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
				<strong>PROCESSED UBI</strong>
				<button id="closeHistory" style="cursor:pointer;">X</button>
			</div>
			<table id="historyTable">
				<thead><tr><th>SourceUBI</th><th>Count</th></tr></thead>
				<tbody id="historyBody"></tbody>
			</table>
		</div>

		<script>
		let groupedData = [];
		let currentIndex = 0;
		let qaResults = JSON.parse(localStorage.getItem("qaResults") || "[]");

		/* --- CHARGEMENT PERSISTANT --- */
		let totalTargetsProcessed = parseInt(localStorage.getItem("totalTargetsProcessed") || "0");
		let processedHistory = JSON.parse(localStorage.getItem("processedHistory") || "[]");

		$(document).ready(function() {
			$("#targetCounter").text(`Total: ${totalTargetsProcessed}`);
			updateHistoryUI();
		});

		/* =========================
		   MODIF : Suggestions & Compteur
		========================= */
		function updateSuggestions() {
		  const datalist = document.getElementById('ubiSuggestions');
		  datalist.innerHTML = ''; 
		  groupedData.forEach(item => {
			const option = document.createElement('option');
			option.value = item.source.sourceUBI;
			datalist.appendChild(option);
		  });
		}

		function updateTaskCounter() {
			const total = $("#viewer .bottom-row .card.bottom").length - 1;
			if (total <= 0) { $("#taskProgress").text("0 / 0"); return; }
			
			let completed = 0;
			$("#viewer .bottom-row .card.bottom").not(":first").each(function() {
				const dupe = $(this).find(".qa-input-dupe").val()?.trim();
				const reason = $(this).find(".qa-input-reason").val()?.trim();
				if (dupe && reason) completed++;
			});
			
			$("#taskProgress").text(`${completed} / ${total}`);
			if (completed === total && total > 0) {
				$("#taskProgress").css("background", "rgba(146, 254, 157, 0.4)");
			} else {
				$("#taskProgress").css("background", "rgba(146, 254, 157, 0.1)");
			}
		}

		$(document).on("input change", ".qa-input-dupe, .qa-input-reason, .qa-check", function() {
			updateTaskCounter();
		});

		$("#ubiHelper").on("change", function() {
		  const val = $(this).val().trim();
		  if (!val) return;
		  const textarea = $("#sourceUBIsearch");
		  const currentVal = textarea.val().trim();
		  const newVal = currentVal ? currentVal + "\n" + val : val;
		  textarea.val(newVal);
		  $(this).val(""); 
		  textarea.focus();
		});

		function groupBySource(data) {
		  const map = {};
		  data.forEach(row => {
			const key = row.sourceUBI;
			if (!key) return;
			if (!map[key]) map[key] = { source: row, targets: [] };
			map[key].targets.push(row);
		  });
		  return Object.values(map);
		}

		function isURL(str) { return /^https?:\/\//.test(str); }
		function truncate(text, max = 60) {
		  if (!text) return "";
		  if (text.length <= max) return text;
		  return text.substring(0, max) + "...";
		}
		function encodeAttr(value) { return encodeURIComponent(value || ""); }
		function decodeAttr(value) { return decodeURIComponent(value || ""); }

		function singleLine(value) {
		  if (!value) return `<div class="line">&nbsp;</div>`;
		  if (isURL(value)) return `<div class="line"><a href="${value}" target="_blank">${truncate(value)}</a></div>`;
		  return `<div class="line">${truncate(value)}</div>`;
		}

		function splitLines(value, maxLines) {
		  let arr = (value || '').split(',').map(v => v.trim());
		  let html = '';
		  for (let i = 0; i < maxLines; i++) {
			let v = arr[i] || "";
			if (!v) html += `<div class="line">&nbsp;</div>`;
			else if (isURL(v)) html += `<div class="line"><a href="${v}" target="_blank">${truncate(v)}</a></div>`;
			else html += `<div class="line">${truncate(v)}</div>`;
		  }
		  return html;
		}

		function block(title, linesHtml) {
		  return `<div class="block" data-type="${title}"><div class="block-title">${title}</div>${linesHtml}</div>`;
		}

		function section(title, content) {
		  return `<div class="section-block"><div class="section-header">${title}</div>${content}</div>`;
		}

		function buildSourceData(s) {
		  let html = `<div class='card bottom'><strong>SOURCE DATA</strong>`;
		  let trademark = "";
		  for (let i = 1; i <= 5; i++) {
			trademark += block(`Trademark${i}RegistrationNumber`, singleLine(s[`sourceTrademark${i}RegistrationNumber`]));
			trademark += block(`Trademark${i}Office`, singleLine(s[`sourceTrademark${i}Office`]));
		  }
		  html += section("Trademark", trademark);
		  let brand = "";
		  for (let i = 1; i <= 5; i++) {
			brand += block(`BrandRepresentation${i}Name`, singleLine(s[`sourceBrandRepresentation${i}Name`]));
			brand += block(`BrandRepresentation${i}Locale`, singleLine(s[`sourceBrandRepresentation${i}Locale`]));
			brand += block(`BrandRepresentation${i}WebsiteURLs`, splitLines(s[`sourceBrandRepresentation${i}WebsiteURLs`], 4));
			brand += block(`BrandRepresentation${i}ProductURLs`, splitLines(s[`sourceBrandRepresentation${i}ProductURLs`], 4));
		  }
		  html += section("BrandRepresentation", brand);
		  let truthset = "";
		  truthset += block("TruthSetTrademark", splitLines(s.sourceTruthSetTrademark, 2));
		  truthset += block("TruthSetWebsite", splitLines(s.sourceTruthSetWebsite, 2));
		  truthset += block("TruthSetProduct1", splitLines(s.sourceTruthSetProduct1, 2));
		  truthset += block("TruthSetProduct2", splitLines(s.sourceTruthSetProduct2, 2));
		  html += section("TruthSet", truthset);
		  html += `</div>`;
		  return html;
		}

		function buildTargetData(t) {
		  let html = `<div class='card bottom'><strong>TARGET DATA</strong>`;
		  let trademark = "";
		  for (let i = 1; i <= 5; i++) {
			trademark += block(`Trademark${i}RegistrationNumber`, singleLine(t[`targetTrademark${i}RegistrationNumber`]));
			trademark += block(`Trademark${i}Office`, singleLine(t[`targetTrademark${i}Office`]));
		  }
		  html += section("Trademark", trademark);
		  let brand = "";
		  for (let i = 1; i <= 5; i++) {
			brand += block(`BrandRepresentation${i}Name`, singleLine(t[`targetBrandRepresentation${i}Name`]));
			brand += block(`BrandRepresentation${i}Locale`, singleLine(t[`targetBrandRepresentation${i}Locale`]));
			brand += block(`BrandRepresentation${i}WebsiteURLs`, splitLines(t[`targetBrandRepresentation${i}WebsiteURLs`], 4));
			brand += block(`BrandRepresentation${i}ProductURLs`, splitLines(t[`targetBrandRepresentation${i}ProductURLs`], 4));
		  }
		  html += section("BrandRepresentation", brand);
		  let truthset = "";
		  truthset += block("TruthSetTrademark", splitLines(t.targetTruthSetTrademark, 2));
		  truthset += block("TruthSetWebsite", splitLines(t.targetTruthSetWebsite, 2));
		  truthset += block("TruthSetProduct1", splitLines(t.targetTruthSetProduct1, 2));
		  truthset += block("TruthSetProduct2", splitLines(t.targetTruthSetProduct2, 2));
		  html += section("TruthSet", truthset);
		  html += block("Answer_IsDupe", `<div class="line">${t.Answer_IsDupe || "&nbsp;"}</div>`);
		  html += block("Answer_Reason", `<div class="line">${t.Answer_Reason || "&nbsp;"}</div>`);
		  html += `
		  <div class="block qa-block">
			<input type="checkbox" class="qa-check" data-dupe="${encodeAttr(t.Answer_IsDupe)}" data-reason="${encodeAttr(t.Answer_Reason)}">
			<input class="block-title qa-title" value="Answer_IsDupe">
			<select class="line qa-input-dupe">
			  <option value="">-- IsDupe --</option>
			  <option value="COULD_NOT_CONCLUDE">COULD_NOT_CONCLUDE</option>
			  <option value="DUPLICATE">DUPLICATE</option>
			  <option value="UNIQUE">UNIQUE</option>
			</select>
		  </div>
		  <div class="block qa-block">
			<input class="block-title qa-title" value="Answer_Reason">
			<select class="line qa-input-reason">
			  <option value="">-- Reason --</option>
			</select>
		  </div>`;
		  html += `</div>`;
		  return html;
		}

		function render() {
		  const container = $("#viewer");
		  container.empty();
		  if (!groupedData.length) return;
		  const item = groupedData[currentIndex];
		  const source = item.source;
		  const targets = item.targets;
		  const cols = targets.length + 1;
		  const topRow = $("<div class='top-row'></div>").css("grid-template-columns", `repeat(${cols}, 1fr)`);
		  const bottomRow = $("<div class='bottom-row'></div>").css("grid-template-columns", `repeat(${cols}, 1fr)`);

		  topRow.append(`<div class='card'><strong>SOURCE</strong><div class='line'>${truncate(source.sourceName)}</div><div class='line'>${truncate(source.sourceUBI)}</div><div class='line'>&nbsp;</div></div>`);
		  targets.forEach((t, i) => {
			topRow.append(`<div class='card'><strong>TARGET ${i+1}</strong><div class='line'>${truncate(t.targetName)}</div><div class='line'>${truncate(t.targetUBI)}</div><div class='line'>${truncate(t.TaskID)}</div></div>`);
		  });

		  bottomRow.append(buildSourceData(source));
		  targets.forEach(t => bottomRow.append(buildTargetData(t)));

		  container.append("<div class='section-title'>TOP</div>").append(topRow).append("<div class='section-title'>BOTTOM</div>").append(bottomRow);
		  $("#counter").text(`${currentIndex+1} / ${groupedData.length}`);
		  hideEmptyRowsAcrossCards();
		  applyHighlight();
		  updateTaskCounter();
		  applyStatusColors();
		  applySourceTargetGlow();
		  
		}

		$("#fileInput").on("change", function() {
		  const file = this.files[0];
		  if (!file) return;
		  const processData = (json) => {
			groupedData = groupBySource(json);
			currentIndex = 0;
			render();
			updateSuggestions();
		  };
		  const reader = new FileReader();
		  reader.onload = function(e) {
			if (file.name.toLowerCase().endsWith(".xlsx") || file.name.toLowerCase().endsWith(".xls")) {
			  const data = new Uint8Array(e.target.result);
			  const workbook = XLSX.read(data, { type: "array" });
			  processData(XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: "" }));
			} else {
			  Papa.parse(file, { header: true, skipEmptyLines: true, complete: (r) => processData(r.data) });
			}
		  };
		  if (file.name.match(/\.xls.?$/)) reader.readAsArrayBuffer(file);
		  else Papa.parse(file, { header: true, skipEmptyLines: true, complete: (r) => processData(r.data) });
		});

		$("#prevBtn").click(()=>{ if(currentIndex>0){currentIndex--;render();}});
		$("#nextBtn").click(()=>{ if(currentIndex<groupedData.length-1){currentIndex++;render();}});

		$(document).on("change", ".qa-check", function() {
		  const isChecked = $(this).is(":checked");
		  const card = $(this).closest(".card");
		  if (isChecked) {
			const dupeVal   = decodeAttr($(this).attr("data-dupe"));
			const reasonVal = decodeAttr($(this).attr("data-reason"));
			card.find(".qa-input-dupe").val(dupeVal);
			populateReasonSelect(card.find(".qa-input-reason"), dupeVal, reasonVal);
		  } else {
			card.find(".qa-input-dupe").val("");
			card.find(".qa-input-reason").empty().append('<option value="">-- Reason --</option>');
		  }
		  updateTaskCounter();
		});

		/* ===== QA DROPDOWNS ===== */
		function getReasonList(dupeVal) {
			if (dupeVal === "DUPLICATE")          return VALID_DUPL_LIST;
			if (dupeVal === "UNIQUE")             return VALID_UNQ_LIST;
			if (dupeVal === "COULD_NOT_CONCLUDE") return VALID_CNC_LIST;
			return [];
		}

		function populateReasonSelect($select, dupeVal, forceValue) {
			$select.empty().append('<option value="">-- Reason --</option>');
			getReasonList(dupeVal).forEach(val => $select.append($('<option>').val(val).text(val)));
			if (forceValue) {
				if (getReasonList(dupeVal).includes(forceValue)) {
					$select.val(forceValue);
				} else {
					$select.append(
						$('<option>').val(forceValue).text('⚠ ' + forceValue)
						.css({ color: '#ff4757', fontStyle: 'italic' })
						.attr('data-exception', 'true')
					).val(forceValue);
				}
			}
		}

		$(document).on('change', '.qa-input-dupe', function() {
			populateReasonSelect($(this).closest('.card').find('.qa-input-reason'), $(this).val(), '');
			updateTaskCounter();
		});


$(document).on("click", "#submitBtn", function() {
		  const targetCount = $("#viewer .top-row .card").length - 1;
		  if (targetCount <= 0) return alert("⚠️ No data");

          // --- DEBUT MODIFICATION : VERIFICATION DES CHAMPS VIDES ---
          let missingFields = false;
          $("#viewer .bottom-row .card.bottom").not(":first").each(function() {
              const dupe = $(this).find(".qa-input-dupe").val()?.trim();
              const reason = $(this).find(".qa-input-reason").val()?.trim();
              if (!dupe || !reason) {
                  missingFields = true;
                  $(this).css("border", "2px solid #ff0044"); // Highlight visuel de la carte incomplète
              } else {
                  $(this).css("border", ""); 
              }
          });

          if (missingFields) {
              alert("⚠️ Erreur : Tous les champs 'IsDupe' et 'Reason' doivent être remplis !");
              return; // Bloque le submit
          }
          // --- FIN MODIFICATION ---

		  let batchResults = [];
		  for (let i = 2; i <= targetCount + 1; i++) {
			const $top = $(`#viewer .top-row .card:nth-child(${i})`);
			const $bottom = $(`#viewer .bottom-row .card:nth-child(${i})`);
			batchResults.push([
			  $top.find("div:nth-child(2)").text().trim(), $top.find("div:nth-child(3)").text().trim(), $top.find("div:nth-child(4)").text().trim(),
			  $bottom.find(".block[data-type='Answer_IsDupe'] .line").first().text().trim(), $bottom.find(".block[data-type='Answer_Reason'] .line").first().text().trim(),
			  $bottom.find(".qa-input-dupe").val()?.trim(), $bottom.find(".qa-input-reason").val()?.trim()
			].join("\t"));
		  }
		  qaResults = qaResults.concat(batchResults);
		  localStorage.setItem("qaResults", JSON.stringify(qaResults));
		  copyToClipboard(batchResults.join("\n"));

		  totalTargetsProcessed += targetCount;
		  localStorage.setItem("totalTargetsProcessed", totalTargetsProcessed);
		  $("#targetCounter").text(`Total: ${totalTargetsProcessed}`);
		  
		  processedHistory.push({ ubi: groupedData[currentIndex].source.sourceUBI, count: targetCount });
		  localStorage.setItem("processedHistory", JSON.stringify(processedHistory));
		  updateHistoryUI();

		  let lines = $("#sourceUBIsearch").val().split('\n').map(l => l.trim()).filter(l => l !== "");
		  if (lines.length > 0 && lines[0] === groupedData[currentIndex].source.sourceUBI.toString()) {
			lines.shift();
			$("#sourceUBIsearch").val(lines.join('\n'));
			if (lines.length > 0) {
				const nextIdx = groupedData.findIndex(item => item.source.sourceUBI.toString() === lines[0]);
				if (nextIdx !== -1) { currentIndex = nextIdx; render(); return; }
			}
		  }

		  if (currentIndex < groupedData.length - 1) { currentIndex++; render(); }
		  else { alert("✅ Done!"); }
		});


		function updateHistoryUI() {
			const body = $("#historyBody"); body.empty();
			processedHistory.forEach(item => {
				body.append(`<tr><td>${item.ubi}</td><td style="text-align:center;">${item.count}</td></tr>`);
			});
		}
		$("#historyBtn").click(() => $("#historyModal").toggle());
		$("#closeHistory").click(() => $("#historyModal").hide());

		function copyToClipboard(text) {
		  const textarea = document.createElement("textarea");
		  textarea.value = text; document.body.appendChild(textarea);
		  textarea.select(); document.execCommand("copy"); textarea.remove();
		}

		$("#playBtn").click(function() {
		  const lines = $("#sourceUBIsearch").val().split('\n').map(l => l.trim()).filter(l => l !== "");
		  if (!lines.length) return alert("⚠️ Empty list");
		  const index = groupedData.findIndex(item => item.source.sourceUBI.toString() === lines[0]);
		  if (index !== -1) { currentIndex = index; render(); }
		  else { alert("⚠️ Not found"); }
		});

		$(document).on("click", "#exportBtn", function() {
		  const data = JSON.parse(localStorage.getItem("qaResults") || "[]");
		  const blob = new Blob([data.join("\n")], { type: "text/tab-separated-values" });
		  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "qa_results.tsv"; a.click();
		});
		$(document).on("click", "#copyBtn", function() {
		  const data = JSON.parse(localStorage.getItem("qaResults") || "[]");
		  if (data.length) { copyToClipboard(data.join("\n")); alert("📋 Copied!"); }
		});
		$(document).on("click", "#resetBtn", function() { 
			if(confirm("Effacer TOUTES les données (TSV, Compteurs, Logs) ?")) {
				localStorage.clear(); 
				qaResults = []; totalTargetsProcessed = 0; processedHistory = [];
				$("#targetCounter").text(`Total: 0`);
				updateHistoryUI();
				alert("🧹 Reset OK"); 
			}
		});

		function hideEmptyRowsAcrossCards() {
		  const cards = $("#viewer .bottom-row > .card");
		  if (!cards.length) return;
		  let maxLines = 0;
		  cards.each(function() { const count = $(this).find(".line").length; if (count > maxLines) maxLines = count; });
		  for (let i = 0; i < maxLines; i++) {
			let allEmpty = true;
			cards.each(function() {
			  const line = $(this).find(".line").eq(i);
			  if (!line.length || line.hasClass("qa-input-dupe") || line.hasClass("qa-input-reason")) { allEmpty = false; return false; }
			  if (line.text().trim() !== "") { allEmpty = false; return false; }
			});
			if (allEmpty) cards.each(function() { $(this).find(".line").eq(i).hide(); });
		  }
		}

		function applyHighlight() {
		  $("#viewer .bottom-row .line").each(function() {
			const txt = $(this).text().toLowerCase();
			$(this).css({"color": "", "font-weight": ""});
			$(this).removeClass("highlight-not-loading highlight-mixed-up");
			if (txt.includes("not_loading")) {
				$(this).addClass("highlight-not-loading");
			} else if (txt.includes("mixed_up_and_truth_set_not_applicable")) {
				$(this).addClass("highlight-mixed-up");
			} else if (txt.includes("target")) {
				$(this).css({"color": "#ff0044", "font-weight": "bold"});
			} else if (txt.includes("source")) {
				$(this).css({"color": "#ad22c5", "font-weight": "bold"});
			}
		  });
		}

		$(document).on('keydown', function(e) {
		  // 1. Navigation TAB entre les Checkboxes
		  if (e.key === 'Tab') {
			const checkboxes = $('.qa-check:visible');
			if (checkboxes.length > 0) {
			  const currentIndexCB = checkboxes.index(document.activeElement);
			  let nextIndex;
			  if (e.shiftKey) {
				nextIndex = currentIndexCB > 0 ? currentIndexCB - 1 : checkboxes.length - 1;
			  } else {
				nextIndex = currentIndexCB < checkboxes.length - 1 ? currentIndexCB + 1 : 0;
			  }
			  e.preventDefault();
			  checkboxes.eq(nextIndex).focus();
			}
		  }

		  // 2. Ctrl + Enter pour SUBMIT
		  if (e.ctrlKey && e.key === 'Enter') {
			e.preventDefault();
			$("#submitBtn").click(); // Déclenche la fonction de validation existante
		  }
		});

function applySourceTargetGlow() {
    // 1. Cible le viewer principal (inchangé)
    const viewerLines = $("#viewer > div.bottom-row > div > div:nth-child(6) > div.line");
    
    // 2. Cible les items de la liste
    const listItems = $("#listContent .summary-item");

    // Traitement Viewer
    viewerLines.each(function() {
        const content = $(this).text().toLowerCase();
        $(this).removeClass("glow-source glow-target");
        if (content.includes('source')) { $(this).addClass("glow-source"); } 
        else if (content.includes('target')) { $(this).addClass("glow-target"); }
    });

    // Traitement Liste (C'est ici que ça se joue)
    listItems.each(function() {
        // On récupère UNIQUEMENT le texte de la réponse, pas le numéro TARGET X
        const responseText = $(this).find(".summary-text").text().toLowerCase();
        
        // On retire d'abord TOUTES les classes de glow pour repartir à zéro
        $(this).removeClass("glow-source glow-target");

        // On n'applique le glow que si le mot est dans la RÉPONSE
        if (responseText.includes('source')) {
            $(this).addClass("glow-source");
        } 
        else if (responseText.includes('target')) {
            $(this).addClass("glow-target");
        }
    });
}
